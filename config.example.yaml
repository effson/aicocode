# AicoCode 配置示例
#
# 用法：复制本文件为 ./.aicocode/config.yaml 并填入真实 api_key。
#       （.aicocode/ 已被 .gitignore 忽略，密钥不会提交）
# 启动：aicocode                          # 默认读 ./.aicocode/config.yaml
#       aicocode --config /path/to/cfg.yaml

providers:
  # 智谱 GLM —— Anthropic 兼容端点，支持扩展思考
  # 注意：智谱用 Authorization 鉴权（非 Anthropic 的 x-api-key），故 auth_token: true
  - name: glm
    protocol: anthropic
    model: glm-4.6            # 或 glm-4.5-air / glm-4-plus / glm-5.2，按智谱控制台可用模型填
    api_key: your-zhipu-api-key
    base_url: https://open.bigmodel.cn/api/anthropic
    auth_token: true
    thinking: false           # GLM-4.5+ 支持扩展思考
    # thinking_budget: 2048
    default: true

  # Anthropic Claude —— 官方，x-api-key 鉴权（auth_token 留 false）
  - name: claude
    protocol: anthropic
    model: claude-sonnet-5
    api_key: sk-ant-xxxxxxxx
    # base_url: https://api.anthropic.com
    thinking: false

  # OpenAI —— 官方或兼容端点
  - name: openai
    protocol: openai
    model: gpt-4o
    api_key: sk-xxxxxxxx
    # base_url: https://api.openai.com/v1
